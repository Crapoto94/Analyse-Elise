networks:
  default:
    name: odata-network

services:
  db:
    image: postgres:16
    container_name: odata-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_MULTIPLE_DATABASES=app_entities
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odata-stats-app
    restart: always
    ports:
      - "5002:5002"
    depends_on:
      - db
    volumes:
      - odata-system-data:/app/data
    environment:
      - DATABASE_URL_SYSTEM=file:/app/data/system.db
      - DATABASE_URL_ENTITIES=postgresql://postgres:postgres@db:5432/app_entities?schema=public
      - SESSION_SECURE=false
      - AUTH_SECRET=ivry-sur-seine-secret-key-2024
      - NODE_ENV=production
      - PORT=5002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  odata-system-data:
  postgres_data:
